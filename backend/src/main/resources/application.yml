spring:
  datasource:
    url: jdbc:h2:mem:reportdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    initialization-mode: always
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

security:
  jwt:
    # NOTE: replace this secret in real environments
    secret: change-me-to-a-longer-jwt-secret-key-1234567890
    # 24 hours in milliseconds
    expiration: 86400000

report:
  templates:
    # Base directory for Excel report templates under classpath resources
    base-path: classpath:report-templates
  security:
    allowed-tables:
      - customer
      - transaction
      - merchant
      - product
      - orders
      - order_items
      - department
      - employee
      - report_config
      - report_run
      - report_audit_event
    forbidden-tokens:
      - ";"
      - "--"
      - "/*"
      - "*/"
      - INSERT
      - UPDATE
      - DELETE
      - DROP
      - ALTER
      - TRUNCATE
      - MERGE
      - EXEC
      - CALL
      - GRANT
      - REVOKE
    max-length: 12000
  parameters:
    templates:
      - report-id: 1
        filters:
          - name: status
            column: t.status
            operator: EQUALS
            allowed-values: ["SUCCESS", "PENDING", "PROCESSING"]
      - report-id: 7
        filters:
          - name: month
            column: t.transaction_date
            operator: EQUALS

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  file:
    name: backend/logs/report-app.log
  level:
    root: INFO